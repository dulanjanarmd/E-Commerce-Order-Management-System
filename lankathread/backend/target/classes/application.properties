# Application Name
spring.application.name=lankathread

# Server Configuration
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/lankathread?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=dul.12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=LankaThreadSecureKey2024ForJwtTokenGenerationAndValidation
jwt.expiration=86400000

# Cloudinary (server-side) - optional. If set, server can upload files to Cloudinary.
# cloudinary.cloud-name=your_cloud_name
# cloudinary.api-key=your_api_key
# cloudinary.api-secret=your_api_secret

# Google OAuth Configuration
# Disabled by default to avoid startup failure when environment variables are not set.
# To enable Google OAuth, set the environment variables `GOOGLE_CLIENT_ID` and
# `GOOGLE_CLIENT_SECRET` and uncomment the lines below.
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.google.scope=openid,profile,email
# spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL for password reset links
app.frontend.url=http://localhost:5173

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.lankathread=DEBUG
